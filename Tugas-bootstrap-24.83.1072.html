<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter&family=Space+Grotesk&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<title>CyberPulse Systems</title>
</head>

<body class="bg-[#0b141c] text-white">

<nav class="fixed top-0 w-full bg-black/60 backdrop-blur border-b border-gray-700">
<div class="flex justify-between p-4 max-w-7xl mx-auto">
    <div class="text-cyan-400 font-bold text-xl">CyberPulse Systems</div>
    <button onclick="showAlert()" class="bg-cyan-500 px-4 py-1 rounded">Build Now</button>
</div>

<section class="relative h-screen flex items-center justify-center text-center">

<img src="https://images.unsplash.com/photo-1593640408182-31c70c8268f5"
     class="absolute w-full h-full object-cover opacity-50">

    <h1 class="text-5xl text-cyan-400 mb-4">pusat belanja Komputer </h1>
    <p class="text-gray-300">Jual beli part komputer & service profesional</p>
</div>

</section>

<section class="p-10 grid md:grid-cols-3 gap-5">

<div class="card">
    <img src="nvidia.png" class="w-full h-40 object-cover mb-3">
    <h3>VGA Card </h3>
    <button onclick="beli('VGA Card')">Beli</button>
</div>

<div class="card">
    <img src="ram.png" class="w-full h-40 object-cover mb-3">
    <h3>RAM</h3>
    <button onclick="beli('RAM')">Beli</button>
</div>

<div class="card">
    <img src="ssd.jpg" class="w-full h-40 object-cover mb-3">
    <h3>Storage</h3>
    <button onclick="beli('Storage')">Beli</button>
